{% extends 'reports/base_report.html' %}

{% block report_content %}
<div class="card shadow-sm">
  <div class="card-body p-0">
    <div class="table-responsive">
      <table class="table report-table mb-0">
        <thead class="table-light">
          <tr>
            <th>Tenant</th>
            <th>Unit</th>
            <th>Property</th>
            <th>Current Balance</th>
          </tr>
        </thead>
        <tbody>
          {% for row in rows %}
          <tr>
            <td>{{ row.tenant }}</td>
            <td>{{ row.unit }}</td>
            <td>{{ row.property }}</td>
            <td>KES {{ row.balance }}</td>
          </tr>
          {% empty %}
          <tr><td colspan="4" class="text-center py-4">No arrears found.</td></tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
</div>

{% include 'reports/pagination.html' %}
{% endblock %}
